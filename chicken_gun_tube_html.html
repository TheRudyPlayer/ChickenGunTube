<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ChickenGunTube</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      color: white;
    }

    header {
      background-color: #202020;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      color: #ff3c3c;
      margin: 0;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .video-card {
      background-color: #1f1f1f;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }

    .thumbnail {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .video-info {
      padding: 10px;
    }

    .player {
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>🐔 ChickenGunTube</h1>
</header>

<div id="main"></div>

<script>
  const videoLinks = [
    "https://youtu.be/qccLjtbBbkM",
    "https://youtu.be/_hdKjo5NR40",
    "https://youtu.be/m3M-RwZebEk",
    "https://youtu.be/fZbO_Tw-o3Q"
  ];

  const main = document.getElementById("main");

  function getVideoId(url) {
    return url.split("/").pop();
  }

  async function loadHome() {
    main.innerHTML = '<div class="container" id="videos"></div>';
    const container = document.getElementById("videos");

    for (let link of videoLinks) {
      const id = getVideoId(link);
      const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
      const data = await res.json();

      const thumbnail = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

      container.innerHTML += `
        <div class="video-card" onclick="loadPlayer('${id}')">
          <img class="thumbnail" src="${thumbnail}" />
          <div class="video-info">
            <div>${data.title}</div>
            <div style="color:gray; font-size:12px;">${data.author_name}</div>
          </div>
        </div>
      `;
    }
  }

  function loadPlayer(id) {
    main.innerHTML = `
      <div class="player">
        <button onclick="loadHome()">⬅ Volver</button>
        <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
      </div>
    `;
  }

  loadHome();
</script>

</body>
</html>
