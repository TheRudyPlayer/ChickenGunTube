<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ChickenGunTube</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
header{background:#202020;padding:10px;display:flex;gap:10px}
input{flex:1;padding:6px;border-radius:20px;border:none}
.container{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:15px}
@media (max-width:600px){.container{grid-template-columns:1fr}}
.video-card{background:#1f1f1f;border-radius:10px;overflow:hidden;cursor:pointer}
.thumbnail{width:100%;height:160px;object-fit:cover}
.video-info{padding:10px}
iframe{width:100%;height:500px;border:none}
.shorts-container{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory}
.short{height:100vh;display:flex;align-items:center;justify-content:center;scroll-snap-align:start}
.short iframe{height:90%;width:320px}
</style>

</head>
<body>

<header>
<h2>🐔 ChickenGunTube</h2>
<input id="search" placeholder="Buscar..." oninput="render()">
<button onclick="openShorts()">Shorts</button>
</header>

<div id="main"></div>

<script>
let videoLinks = [];
let shortsLinks = [];
let videosData = [];
let order = [];

const main = document.getElementById("main");

function getID(url){
 if(url.includes("shorts/")) return url.split("shorts/")[1].split("?")[0];
 if(url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
 if(url.includes("watch?v=")) return url.split("v=")[1].split("&")[0];
}

function shuffle(a){
 for(let i=a.length-1;i>0;i--){
  let j=Math.floor(Math.random()*(i+1));
  [a[i],a[j]]=[a[j],a[i]];
 }
 return a;
}

async function loadLinks(){
 const res = await fetch("./LinkVideo.html");
 let text = await res.text();

 // quitar html
 text = text.replace(/<[^>]*>/g,"");

 let mode = "";

 text.split("\n").forEach(line=>{
  line = line.trim();

  if(line === "#VIDEOS"){mode="video"; return;}
  if(line === "#SHORTS"){mode="short"; return;}

  const matches = line.match(/\"(https?:\/\/[^\"]+)\"/g);

  if(matches){
   matches.forEach(m=>{
    let link = m.replace(/\"/g,"").replace(/,$/,"");

    if(mode==="video") videoLinks.push(link);
    if(mode==="short") shortsLinks.push(link);
   });
  }
 });

 console.log("VIDEOS:", videoLinks);
}

async function loadVideos(){
 videosData = [];

 videoLinks.forEach(link=>{
  const id = getID(link);

  videosData.push({id,title:"Cargando...",author_name:"..."});

  fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`)
  .then(r=>r.json())
  .then(data=>{
   let v = videosData.find(x=>x.id===id);
   if(v){
    v.title = data.title;
    v.author_name = data.author_name;
    updateCard(id);
   }
  });
 });

 // RANDOM SOLO UNA VEZ
 order = shuffle(videoLinks.map(getID));
}

function updateCard(id){
 let card = document.getElementById("c_"+id);
 let v = videosData.find(v=>v.id===id);

 if(card && v){
  card.querySelector(".video-info").innerHTML =
   `<div>${v.title}</div>
    <div style="color:gray">${v.author_name}</div>`;
 }
}

function render(){
 let search = document.getElementById("search").value.toLowerCase();

 main.innerHTML = `<div class="container" id="c"></div>`;
 let c = document.getElementById("c");

 order.forEach(id=>{
  let v = videosData.find(v=>v.id===id);
  if(!v) return;

  if(search && !(v.title.toLowerCase().includes(search) || v.author_name.toLowerCase().includes(search))) return;

  let card = document.createElement("div");
  card.className="video-card";
  card.id="c_"+id;
  card.onclick=()=>openVideo(id,v.author_name);

  card.innerHTML = `
  <img class="thumbnail" src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
  <div class="video-info">
    <div>${v.title}</div>
    <div style="color:gray">${v.author_name}</div>
  </div>`;

  c.appendChild(card);
 });
}

function openVideo(id,author){
 main.innerHTML = `
 <button onclick="render()">⬅ Volver</button>
 <iframe src="https://www.youtube.com/embed/${id}"></iframe>
 <h3>${author}</h3>
 `;
}

function openShorts(){
 main.innerHTML = `<div class="shorts-container" id="s"></div>`;
 let s = document.getElementById("s");

 let arr = shuffle(shortsLinks.map(getID));

 arr.forEach(id=>{
  let div = document.createElement("div");
  div.className="short";
  div.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
  s.appendChild(div);
 });
}

// INIT
(async()=>{
 await loadLinks();
 await loadVideos();
 render();
})();
</script>

</body>
</html>
