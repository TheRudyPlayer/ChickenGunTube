<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CGTube</title>
<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  color: white;
}
.header {
  padding: 20px;
  background: #121212;
  display: flex;
  justify-content: center;
  align-items: center;
  border-bottom: 1px solid #222;
}
.header .logo img {
  height: 60px; /* Logo grande */
}
.videos {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}
.card {
  cursor: pointer;
}
.card img {
  width: 100%;
  border-radius: 10px;
}
.card .title {
  margin-top: 8px;
  font-weight: bold;
  font-size: 14px;
}
.card .channel {
  color: #aaa;
  font-size: 12px;
  margin-top: 2px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="images/chickentube_logo.png">
  </div>
</div>

<div class="videos" id="videoContainer">
  <!-- Los videos llegarán desde VideoSystem -->
</div>

<script>
// 🔹 Función para pedir todos los links a LinkVideo
async function obtenerLinks() {
  const res = await fetch("LinkVideo.html");
  const text = await res.text();

  // Extraer array de links
  const arrayMatch = text.match(/const videos = \[(.*?)\]/s);
  let videos = [];
  if (arrayMatch) {
    videos = arrayMatch[1]
      .split(",")
      .map(v => v.trim().replace(/['"]/g, ""))
      .filter(v => v.length > 0);
  }
  return videos;
}

// 🔹 Crear tarjetas usando VideoSystem para datos reales
async function cargarVideos() {
  const videos = await obtenerLinks();
  const container = document.getElementById("videoContainer");

  for (let url of videos) {
    // Obtener ID de YouTube
    let id = url.includes("watch?v=") ? url.split("watch?v=")[1].split("&")[0] : url.split("youtu.be/")[1];

    // Crear tarjeta
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${id}/0.jpg">
      <div class="title">Cargando...</div>
      <div class="channel"></div>
    `;

    // Obtener título y canal con oEmbed
    fetch(`https://www.youtube.com/oembed?url=${url}&format=json`)
      .then(res => res.json())
      .then(data => {
        div.querySelector(".title").textContent = data.title;
        div.querySelector(".channel").textContent = data.author_name;
      })
      .catch(() => {
        div.querySelector(".title").textContent = "Video";
        div.querySelector(".channel").textContent = "";
      });

    // Al hacer click → abrir VideoSystem
    div.onclick = () => {
      window.location.href = "VideoSystem.html?url=" + encodeURIComponent(url);
    };

    container.appendChild(div);
  }
}

// Ejecutar
cargarVideos();
</script>

</body>
</html>
