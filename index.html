<!DOCTYPE html>
<html lang="es">
<head>
<link rel="icon" type="image/png" href="images/chickenguntube_weblogo.png">
<meta charset="UTF-8">
<title>CGTube</title>
<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  color: white;
}
.header {
  padding: 20px;
  background: #121212;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #222;
}
.header .logo img {
  height: 60px;
  cursor: pointer;
}
.search-bar {
  padding: 5px 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  outline: none;
}
.videos {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}
.card {
  cursor: pointer;
}
.card img {
  width: 100%;
  border-radius: 10px;
  display: block;
}
.card .title, .card .channel {
  margin-top: 5px;
}
.card .title {
  font-weight: bold;
  font-size: 14px;
}
.card .channel {
  color: #aaa;
  font-size: 12px;
  margin-top: 2px;
}
.skeleton {
  background: #222;
  border-radius: 10px;
  width: 100%;
  height: 120px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% {opacity: 0.6;}
  50% {opacity: 0.3;}
  100% {opacity: 0.6;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="images/chickentube_logo.png" onclick="window.location.href='index.html'">
  </div>
  <input type="text" placeholder="Buscar videos o canales..." class="search-bar" id="searchInput">
</div>

<div class="videos" id="videoContainer"></div>

<script>
let todosVideos = []; // Para filtrar después

// 🔹 Pedir links de LinkVideo
async function obtenerLinks() {
  const res = await fetch("LinkVideo.html");
  const text = await res.text();
  const arrayMatch = text.match(/const videos = \[(.*?)\]/s);
  let videos = [];
  if (arrayMatch) {
    videos = arrayMatch[1]
      .split(",")
      .map(v => v.trim().replace(/['"]/g, ""))
      .filter(v => v.length > 0);
  }
  return videos;
}

// 🔹 Mezclar array
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// 🔹 Crear tarjeta
function crearTarjeta(video) {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `<div class="skeleton"></div>`;

  let id = video.url.includes("watch?v=") ? video.url.split("watch?v=")[1].split("&")[0] : video.url.split("youtu.be/")[1];

  fetch(`https://www.youtube.com/oembed?url=${video.url}&format=json`)
    .then(res => res.json())
    .then(data => {
      video.title = data.title;
      video.channel = data.author_name;
      div.innerHTML = `
        <img src="https://img.youtube.com/vi/${id}/0.jpg">
        <div class="title">${data.title}</div>
        <div class="channel">${data.author_name}</div>
      `;
    })
    .catch(() => {
      video.title = "Video";
      video.channel = "";
      div.innerHTML = `
        <img src="https://img.youtube.com/vi/${id}/0.jpg">
        <div class="title">Video</div>
        <div class="channel"></div>
      `;
    });

  div.onclick = () => {
    window.location.href = "Video.html?url=" + encodeURIComponent(video.url);
  };

  return div;
}

// 🔹 Cargar todos los videos
async function cargarVideos() {
  let links = await obtenerLinks();
  links = shuffle(links);
  todosVideos = links.map(url => ({url}));

  mostrarVideos(todosVideos);
}

// 🔹 Mostrar videos filtrados
function mostrarVideos(array) {
  const container = document.getElementById("videoContainer");
  container.innerHTML = "";
  array.forEach(video => {
    container.appendChild(crearTarjeta(video));
  });
}

// 🔹 Filtrar según input
document.getElementById("searchInput").addEventListener("input", e => {
  const term = e.target.value.toLowerCase();
  const filtrados = todosVideos.filter(v => 
    (v.title && v.title.toLowerCase().includes(term)) ||
    (v.channel && v.channel.toLowerCase().includes(term))
  );
  mostrarVideos(filtrados);
});

cargarVideos();
</script>

</body>
</html>
