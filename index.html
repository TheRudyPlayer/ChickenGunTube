<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CGTube</title>
<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  color: white;
}
.header {
  padding: 20px;
  background: #121212;
  display: flex;
  justify-content: center;
  align-items: center;
  border-bottom: 1px solid #222;
}
.header .logo img {
  height: 60px; /* Logo grande */
}
.videos {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="images/chickentube_logo.png">
  </div>
</div>

<div class="videos" id="videoContainer">
  <!-- Los videos se mostrarán aquí solo después de que VideoSystem pase los datos -->
</div>

<script>
// 🔹 Recibir datos de VideoSystem (opcional)
window.addEventListener("message", (event) => {
  if (event.data.type === "videoData") {
    const container = document.getElementById("videoContainer");
    container.innerHTML = ""; // Limpiar si había algo
    event.data.videos.forEach(v => {
      const div = document.createElement("div");
      div.style.marginBottom = "20px";
      div.innerHTML = `
        <img src="${v.thumbnail}" style="width:300px;border-radius:10px;">
        <div style="font-weight:bold;margin-top:5px;">${v.title}</div>
        <div style="color:#aaa;">${v.channel}</div>
      `;
      container.appendChild(div);
    });
  }
});
</script>

</body>
</html>
