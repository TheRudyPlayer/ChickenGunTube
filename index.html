<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ChickenGunTube</title>
  <style>
    body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }
    header { background:#202020; padding:10px 20px; display:flex; gap:10px; align-items:center; }
    header h1 { color:#ff3c3c; margin:0; }
    input { flex:1; padding:6px; border-radius:20px; border:none; outline:none; }

    .container { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; padding:20px; }
    .video-card { background:#1f1f1f; border-radius:10px; overflow:hidden; cursor:pointer; }
    .thumbnail { width:100%; height:180px; object-fit:cover; }
    .video-info { padding:10px; }
    .player { padding:20px; }
    iframe { width:100%; height:500px; border:none; border-radius:10px; }
  </style>
</head>
<body>

<header>
  <h1>🐔 ChickenGunTube</h1>
  <input type="text" id="search" placeholder="Buscar videos..." oninput="loadHome()">
</header>

<div id="main"></div>

<script>
const videoLinks = [
"https://youtu.be/qccLjtbBbkM",
"https://youtu.be/_hdKjo5NR40",
"https://youtu.be/m3M-RwZebEk",
"https://youtu.be/fZbO_Tw-o3Q",
"https://youtu.be/tP-BqF_jtLA",
"https://youtu.be/_Qu03z4z9gY",
"https://youtu.be/K5-OkvRmPR0",
"https://youtu.be/UqZff8U7ccg",
"https://youtu.be/cGpKTx35maM",
"https://youtu.be/jUUGSuCHJbg",
"https://youtu.be/NY8sJ0eSC-w",
"https://youtu.be/zl1oLKIbEvE",
"https://youtu.be/ZGFoxQB8L3E",
"https://youtu.be/FCJ9hZnFrTo",
"https://youtu.be/PFSxjgC2iTk",
"https://youtu.be/s51MPbBYhLU",
"https://youtu.be/ruYuZn4Pw64",
"https://youtu.be/oRSi2adINes",
"https://youtu.be/vfejXap4dpM",
"https://youtu.be/i7shcD7dqx4",
"https://youtu.be/J8EizXyANpU",
"https://youtu.be/QesM1RNvqRU",
"https://youtu.be/f-6J8iFeGtE",
"https://youtu.be/d3fuW_TdQXQ",
"https://youtu.be/s_geZlI4vOU",
"https://youtu.be/iL3o0YUfVZU",
"https://youtu.be/SB6t85igDaE",
"https://youtu.be/pAdICtH0rdI"
];

const main = document.getElementById("main");

function getVideoId(url){
  if(url.includes("youtu.be/")){
    return url.split("youtu.be/")[1].split("?")[0];
  }
  if(url.includes("watch?v=")){
    return url.split("v=")[1].split("&")[0];
  }
  return null;
}

async function loadHome(){
  let search = document.getElementById("search").value.toLowerCase();

  if(!search){
    search = "chicken gun";
  }

  main.innerHTML = '<div class="container" id="videos"></div>';
  const container = document.getElementById("videos");

  const shuffled = [...videoLinks];
  for(let i = shuffled.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  for(const link of shuffled){
    const id = getVideoId(link);
    if(!id) continue;

    try{
      const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
      const data = await res.json();

      if(search && !data.title.toLowerCase().includes(search) && !data.author_name.toLowerCase().includes(search)){
        continue;
      }

      const thumbnail = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

      const card = document.createElement("div");
      card.className = "video-card";
      card.onclick = () => loadPlayer(id);

      card.innerHTML = `
        <img class="thumbnail" src="${thumbnail}">
        <div class="video-info">
          <div>${data.title}</div>
          <div style="color:gray;font-size:12px;">${data.author_name}</div>
        </div>
      `;

      container.appendChild(card);

    }catch(e){
      console.log("error video", id);
    }
  }
}

function loadPlayer(id){
  main.innerHTML = `
    <div class="player">
      <button onclick="loadHome()">⬅ Volver</button>
      <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
    </div>
  `;
}

loadHome();
</script>

</body>
</html>
