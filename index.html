<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CGTube</title>
<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial, sans-serif;
}
.header {
  padding: 20px 20px;
  background: #121212;
  display: flex;
  justify-content: center;
  align-items: center;
  border-bottom: 1px solid #222;
}
.header .logo img {
  height: 60px; /* Logo más grande */
}
.videos {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}
.card {
  cursor: pointer;
}
.card img {
  width: 100%;
  border-radius: 10px;
}
.card .title {
  margin-top: 8px;
  font-weight: bold;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="images/chickentube_logo.png">
  </div>
</div>

<div class="videos" id="videoContainer"></div>

<script>
// 🔹 Links de LinkVideo
const videoLinks = [
  "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
  "https://www.youtube.com/watch?v=3JZ_D3ELwOQ",
  "https://www.youtube.com/watch?v=9bZkp7q19f0",
  "https://youtu.be/_hdKjo5NR40",
  "https://youtu.be/m3M-RwZebEk",
  "https://youtu.be/fZbO_Tw-o3Q"
];

const container = document.getElementById("videoContainer");

function crearTarjeta(url) {
  let id = url.includes("watch?v=") ? url.split("watch?v=")[1].split("&")[0] : url.split("youtu.be/")[1];
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/0.jpg">
    <div class="title">Cargando...</div>
  `;

  // Título real
  fetch(`https://www.youtube.com/oembed?url=${url}&format=json`)
    .then(res => res.json())
    .then(data => {
      div.querySelector(".title").textContent = data.title;
    })
    .catch(() => {
      div.querySelector(".title").textContent = "Título no disponible";
    });

  div.onclick = () => {
    // 🔹 Llamar VideoSystem y pasar link
    window.location.href = "VideoSystem.html?url=" + encodeURIComponent(url);
  };

  container.appendChild(div);
}

videoLinks.forEach(crearTarjeta);
</script>

</body>
</html>
