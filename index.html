<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ChickenGunTube</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;overflow-y:scroll}
header{background:#202020;padding:10px 20px;display:flex;gap:10px;position:sticky;top:0;z-index:10}
header h1{color:#ff3c3c;margin:0}
input{flex:1;padding:6px;border-radius:20px;border:none}
.container{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;padding:20px}
.video-card{background:#1f1f1f;border-radius:10px;overflow:hidden;cursor:pointer}
.thumbnail{width:100%;height:180px;object-fit:cover}
.video-info{padding:10px}
.player{padding:20px}
iframe{width:100%;height:500px;border:none;border-radius:10px}
.channel{display:flex;align-items:center;gap:10px;margin-top:10px;cursor:pointer}
.channel img{width:30px;height:30px;border-radius:50%}

/* shorts */
.shorts-container{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory}
.short{height:100vh;display:flex;align-items:center;justify-content:center;scroll-snap-align:start;flex-direction:column}
.short iframe{height:80%;width:300px}
.like-btn{margin-top:10px;cursor:pointer}
</style>
</head>
<body>

<header>
<h1>🐔 ChickenGunTube</h1>
<input type="text" id="search" placeholder="Buscar..." oninput="resetAndRender()">
<button onclick="openShorts()">Shorts</button>
</header>

<div id="main"></div>

<script>
const videoLinks = [
"https://youtu.be/qccLjtbBbkM",
"https://youtu.be/_hdKjo5NR40",
"https://youtu.be/m3M-RwZebEk",

"https://youtu.be/UqZff8U7ccg",

"https://youtu.be/NY8sJ0eSC-w",

"https://youtu.be/ZGFoxQB8L3E",
"https://youtu.be/FCJ9hZnFrTo",
"https://youtu.be/PFSxjgC2iTk",
"https://youtu.be/s51MPbBYhLU",
"https://youtu.be/ruYuZn4Pw64",
"https://youtu.be/oRSi2adINes",
"https://youtu.be/vfejXap4dpM",
"https://youtu.be/i7shcD7dqx4",
"https://youtu.be/J8EizXyANpU",

"https://youtu.be/f-6J8iFeGtE",

"https://youtu.be/_uwxQJ6KH2Y",
"https://youtu.be/K4v_N0VPJFA",
"https://youtu.be/bqenfzRAz1k",
"https://youtu.be/_2i7JU9iGOM",
"https://youtu.be/Vw1W_5exiRw",
"https://youtu.be/2kS7SP3uBSk",
"https://youtu.be/5Q59YDeV5sM",
"https://youtu.be/AQV3cMZfhJo",
"https://youtu.be/R6_kjcBeFpg",
"https://youtu.be/kpuORHAk39w",
"https://youtu.be/qaY5BHR9gmE",

"https://youtu.be/S2ftuageELc",
"https://youtu.be/fp4EbUAm600",
"https://youtu.be/EjaVs-mQZs4",
"https://youtu.be/ToZOhway8p8",
"https://youtu.be/ia5oVfglWk4"
];

const shortsLinks = [
"https://youtube.com/shorts/7bJ5ByJwRW8",
"https://youtube.com/shorts/ZarEZbchMm4",
"https://youtube.com/shorts/QWijasdYtb0",
"https://youtube.com/shorts/6s6gSnT-kXQ",
"https://youtube.com/shorts/cszaisrd6dk"
];

let filtered = [];
let currentIndex = 0;
const LOAD_PER_SCROLL = 4;

const main = document.getElementById("main");

function getVideoId(url){
  if(url.includes("shorts/")) return url.split("shorts/")[1].split("?")[0];
  if(url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
  if(url.includes("watch?v=")) return url.split("v=")[1].split("&")[0];
  return null;
}

function resetAndRender(){
  currentIndex = 0;
  main.innerHTML = '<div class="container" id="videos"></div>';

  let search = document.getElementById("search").value.toLowerCase();
  const useFilter = search.length > 0;

  filtered = videoLinks.map(link => getVideoId(link)).filter(id=>id);

  loadMore(useFilter, search);
}

function loadMore(useFilter, search){
  const container = document.getElementById("videos");
  if(!container) return;

  let count = 0;

  while(currentIndex < filtered.length && count < LOAD_PER_SCROLL){
    const id = filtered[currentIndex++];

    const thumbnail = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

    const card = document.createElement("div");
    card.className = "video-card";
    card.onclick = () => loadPlayer(id);

    card.innerHTML = `
      <img class="thumbnail" src="${thumbnail}">
      <div class="video-info">
        <div>Cargando...</div>
        <div style="color:gray;font-size:12px;">...</div>
      </div>
    `;

    container.appendChild(card);

    fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`)
    .then(res=>res.json())
    .then(data=>{
      if(!useFilter || data.title.toLowerCase().includes(search) || data.author_name.toLowerCase().includes(search)){
        card.querySelector(".video-info").innerHTML = `
          <div>${data.title}</div>
          <div style="color:gray;font-size:12px;">${data.author_name}</div>
        `;

        // canal clickeable
        const channelDiv = document.createElement("div");
        channelDiv.className = "channel";
        channelDiv.innerHTML = `
          <img src="https://ui-avatars.com/api/?name=${data.author_name}">
          <span>${data.author_name}</span>
        `;
        channelDiv.onclick = (e)=>{
          e.stopPropagation();
          openChannel(data.author_name);
        };
        card.appendChild(channelDiv);

      } else {
        card.remove();
      }
    }).catch(()=>card.remove());

    count++;
  }
}

function loadPlayer(id){
  window.scrollTo(0,0);
  main.innerHTML = `
    <div class="player">
      <button onclick="resetAndRender()">⬅ Volver</button>
      <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
    </div>
  `;
}

function openChannel(name){
  main.innerHTML = '<div class="container" id="videos"></div>';
  const container = document.getElementById("videos");

  videoLinks.forEach(link=>{
    const id = getVideoId(link);
    fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`)
    .then(res=>res.json())
    .then(data=>{
      if(data.author_name===name){
        const card = document.createElement("div");
        card.className="video-card";
        card.onclick=()=>loadPlayer(id);

        card.innerHTML=`
        <img class="thumbnail" src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
        <div class="video-info">${data.title}</div>`;

        container.appendChild(card);
      }
    });
  });
}

function openShorts(){
  main.innerHTML = '<div class="shorts-container" id="shorts"></div>';
  const container = document.getElementById("shorts");

  shortsLinks.forEach(link=>{
    const id = getVideoId(link);

    const short = document.createElement("div");
    short.className="short";

    short.innerHTML=`
      <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
      <div class="like-btn" onclick="this.innerText = this.innerText==='❤️ 1' ? '🤍 0' : '❤️ 1'">🤍 0</div>
    `;

    container.appendChild(short);
  });
}

window.addEventListener("scroll", () => {
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 100){
    let search = document.getElementById("search").value.toLowerCase();
    const useFilter = search.length > 0;
    loadMore(useFilter, search);
  }
});

resetAndRender();
</script>

</body>
</html>
