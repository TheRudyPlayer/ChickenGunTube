<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CGTube</title>
<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  color: white;
}
.header {
  padding: 20px;
  background: #121212;
  display: flex;
  justify-content: center;
  align-items: center;
  border-bottom: 1px solid #222;
}
.header .logo img {
  height: 60px;
  cursor: pointer;
}
.videos {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}
.card {
  cursor: pointer;
}
.card img {
  width: 100%;
  border-radius: 10px;
  display: block;
}
.card .title, .card .channel {
  margin-top: 5px;
}
.card .title {
  font-weight: bold;
  font-size: 14px;
}
.card .channel {
  color: #aaa;
  font-size: 12px;
}

/* 🔹 Skeleton de carga */
.skeleton {
  background: #222;
  border-radius: 10px;
  width: 100%;
  height: 120px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% {opacity: 0.6;}
  50% {opacity: 0.3;}
  100% {opacity: 0.6;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="images/chickentube_logo.png" onclick="window.location.href='index.html'">
  </div>
</div>

<div class="videos" id="videoContainer"></div>

<script>
// 🔹 Pedir los links de LinkVideo
async function obtenerLinks() {
  const res = await fetch("LinkVideo.html");
  const text = await res.text();
  const arrayMatch = text.match(/const videos = \[(.*?)\]/s);
  let videos = [];
  if (arrayMatch) {
    videos = arrayMatch[1]
      .split(",")
      .map(v => v.trim().replace(/['"]/g, ""))
      .filter(v => v.length > 0);
  }
  return videos;
}

// 🔹 Mezclar array
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// 🔹 Cargar videos
async function cargarVideos() {
  let videos = await obtenerLinks();
  videos = shuffle(videos); // 🔹 Aleatorio
  const container = document.getElementById("videoContainer");

  for (let url of videos) {
    // Skeleton
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<div class="skeleton"></div>`;
    container.appendChild(div);

    let id = url.includes("watch?v=") ? url.split("watch?v=")[1].split("&")[0] : url.split("youtu.be/")[1];

    fetch(`https://www.youtube.com/oembed?url=${url}&format=json`)
      .then(res => res.json())
      .then(data => {
        div.innerHTML = `
          <img src="https://img.youtube.com/vi/${id}/0.jpg">
          <div class="title">${data.title}</div>
          <div class="channel">${data.author_name}</div>
        `;
      })
      .catch(() => {
        div.innerHTML = `
          <img src="https://img.youtube.com/vi/${id}/0.jpg">
          <div class="title">Video</div>
          <div class="channel"></div>
        `;
      });

    // Click para abrir VideoSystem
    div.onclick = () => {
      window.location.href = "VideoSystem.html?url=" + encodeURIComponent(url);
    };
  }
}

cargarVideos();
</script>

</body>
</html>
