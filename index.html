<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CGTube</title>

<style>

:root{
    --bg:#0f0f0f;
    --panel:#0f0f0f;
    --card:#181818;
    --hover:#272727;
    --text:#f1f1f1;
    --sub:#aaaaaa;
    --border:#303030;
}

body.light{
    --bg:#ffffff;
    --panel:#ffffff;
    --card:#ffffff;
    --hover:#f2f2f2;
    --text:#0f0f0f;
    --sub:#606060;
    --border:#e5e5e5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
    width:72px;
    background:var(--panel);
    border-right:1px solid var(--border);

    position:fixed;
    top:0;
    left:0;
    bottom:0;

    display:flex;
    flex-direction:column;
    align-items:center;

    padding-top:10px;

    z-index:100;
}

.logo{
    width:100%;
    height:60px;

    display:flex;
    align-items:center;
    justify-content:center;

    margin-bottom:10px;
}

.logo img{
    width:44px;
    height:44px;

    object-fit:contain;
    display:block;
}

.nav-btn{
    width:64px;
    height:74px;

    border:none;
    background:none;

    color:var(--text);

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    gap:6px;

    border-radius:12px;

    cursor:pointer;

    transition:.15s;
}

.nav-btn:hover{
    background:var(--hover);
}

.nav-btn svg{
    width:24px;
    height:24px;

    stroke:currentColor;
    fill:none;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
}

.nav-btn span{
    font-size:10px;
}

/* MAIN */

.main{
    margin-left:72px;
    min-height:100vh;
}

/* TOPBAR */

.topbar{
    position:sticky;
    top:0;

    height:56px;

    background:var(--bg);

    border-bottom:1px solid var(--border);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 16px;

    z-index:50;
}

.brand{
    display:flex;
    align-items:center;
}

.brand img{
    height:34px;
    width:auto;

    object-fit:contain;

    display:block;
}

.search{
    width:50%;
    max-width:650px;

    display:flex;
    align-items:center;

    border:1px solid var(--border);

    border-radius:999px;

    overflow:hidden;
}

.search input{
    flex:1;

    height:40px;

    border:none;
    outline:none;

    background:transparent;

    color:var(--text);

    padding:0 14px;

    font-size:15px;
}

.search button{
    width:60px;
    height:40px;

    border:none;

    border-left:1px solid var(--border);

    background:var(--card);

    cursor:pointer;

    color:var(--text);
}

/* CONTENT */

.content{
    padding:20px;
}

.section{
    margin-bottom:40px;
}

.section-header{
    margin-bottom:18px;
}

.section-header h2{
    font-size:22px;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(280px,1fr));

    gap:18px;
}

.shorts-grid{
    grid-template-columns:
    repeat(auto-fill,minmax(180px,1fr));
}

/* CARD */

.card{
    cursor:pointer;
}

.thumb-wrap{
    overflow:hidden;

    border-radius:14px;

    position:relative;

    background:#222;
}

.thumb{
    width:100%;
    aspect-ratio:16/9;

    background-size:cover;
    background-position:center;

    transition:transform .2s;
}

.card:hover .thumb{
    transform:scale(1.03);
}

.shorts-grid .thumb{
    aspect-ratio:9/16;
}

.short-badge{
    position:absolute;
    top:8px;
    left:8px;

    background:red;
    color:white;

    font-size:10px;
    font-weight:bold;

    padding:4px 7px;

    border-radius:999px;
}

.card h3{
    margin-top:10px;

    font-size:15px;
    line-height:1.4;
}

.card p{
    margin-top:4px;

    color:var(--sub);

    font-size:13px;
}

/* PLAYER */

.player-screen{
    display:none;

    position:fixed;
    inset:0;

    background:var(--bg);

    z-index:1000;

    overflow-y:auto;
}

.player-top{
    height:60px;

    border-bottom:1px solid var(--border);

    display:flex;
    align-items:center;

    padding:0 15px;
}

.back-btn{
    display:flex;
    align-items:center;
    gap:8px;

    background:none;
    border:none;

    color:var(--text);

    cursor:pointer;

    font-size:15px;
}

.back-btn svg{
    width:22px;
    height:22px;

    stroke:currentColor;
    fill:none;
    stroke-width:2;
}

.player-layout{
    display:grid;
    grid-template-columns:1fr 380px;

    gap:24px;

    padding:20px;
}

.player-box{
    width:100%;
    aspect-ratio:16/9;

    border-radius:14px;

    overflow:hidden;

    background:black;
}

.player-box.short{
    max-width:420px;
    aspect-ratio:9/16;
}

.player-box iframe{
    width:100%;
    height:100%;
    border:none;
}

.video-info{
    margin-top:14px;
}

.video-info h2{
    font-size:22px;
    line-height:1.4;
}

.video-info p{
    margin-top:6px;
    color:var(--sub);
}

/* RECOMMENDED */

.recommended{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.rec-card{
    display:flex;
    gap:10px;

    cursor:pointer;
}

.rec-thumb{
    width:168px;
    aspect-ratio:16/9;

    border-radius:10px;

    background-size:cover;
    background-position:center;

    flex-shrink:0;
}

.rec-info h4{
    font-size:14px;
    line-height:1.4;
}

.rec-info p{
    margin-top:4px;

    font-size:12px;

    color:var(--sub);
}

/* SETTINGS */

.settings{
    position:fixed;

    left:72px;
    top:60px;

    width:240px;

    background:var(--bg);

    border:1px solid var(--border);

    padding:14px;

    display:none;

    z-index:200;
}

.settings button{
    width:100%;
    height:42px;

    border:none;

    background:var(--card);

    color:var(--text);

    border-radius:10px;

    margin-bottom:10px;

    cursor:pointer;
}

/* MOBILE */

@media(max-width:1000px){

.player-layout{
    grid-template-columns:1fr;
}

}

@media(max-width:700px){

.grid{
    grid-template-columns:1fr;
}

.shorts-grid{
    grid-template-columns:repeat(2,1fr);
}

.search{
    width:100%;
}

}

</style>
</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<img src="images/chickenguntube_weblogo.png">
</div>

<button class="nav-btn" onclick="showHome()">

<svg viewBox="0 0 24 24">
<path d="M3 10L12 3L21 10"/>
<path d="M5 9V20H19V9"/>
</svg>

<span>Inicio</span>

</button>

<button class="nav-btn" onclick="showShorts()">

<svg viewBox="0 0 24 24">
<path d="M8 5L16 9L8 13"/>
<path d="M8 11L16 15L8 19"/>
</svg>

<span>Shorts</span>

</button>

<button class="nav-btn" onclick="toggleSettings()">

<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
<path d="M12 2V5"/>
<path d="M12 19V22"/>
<path d="M2 12H5"/>
<path d="M19 12H22"/>
</svg>

<span>Ajustes</span>

</button>

</div>

<!-- SETTINGS -->

<div class="settings" id="settings">

<button onclick="toggleTheme()">
Cambiar tema
</button>

<button onclick="randomShort()">
Short aleatorio
</button>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<div class="brand">

<img src="images/chickentube_logo.png">

</div>

<div class="search">

<input
type="text"
id="searchInput"
placeholder="Buscar">

<button>🔍</button>

</div>

</div>

<!-- CONTENT -->

<div class="content">

<!-- VIDEOS -->

<div class="section" id="videosSection">

<div class="section-header">
<h2>Videos</h2>
</div>

<div class="grid" id="videosGrid"></div>

</div>

<!-- SHORTS -->

<div class="section" id="shortsSection">

<div class="section-header">
<h2>Shorts</h2>
</div>

<div class="grid shorts-grid" id="shortsGrid"></div>

</div>

</div>

</div>

<!-- PLAYER -->

<div class="player-screen" id="playerScreen">

<div class="player-top">

<button class="back-btn" onclick="closePlayer()">

<svg viewBox="0 0 24 24">
<path d="M15 5L8 12L15 19"/>
</svg>

Volver

</button>

</div>

<div class="player-layout">

<div>

<div class="player-box" id="playerBox">

<iframe
id="player"
allowfullscreen
allow="autoplay">
</iframe>

</div>

<div class="video-info">

<h2 id="videoTitle"></h2>

<p id="videoChannel"></p>

</div>

</div>

<div class="recommended" id="recommended"></div>

</div>

</div>

<script>

/* LINKS DESDE LinkVideo.html */

const rawItems =
JSON.parse(localStorage.getItem("CGTubeLinks")) || [];

let library = [];

/* EXTRAER ID */

function getVideoId(url){

try{

const clean = url.trim();

const parsed = new URL(clean);

if(parsed.searchParams.get("v")){

return parsed.searchParams.get("v");

}

if(clean.includes("/shorts/")){

return clean
.split("/shorts/")[1]
.split("?")[0]
.split("&")[0];

}

if(clean.includes("youtu.be/")){

return clean
.split("youtu.be/")[1]
.split("?")[0]
.split("&")[0];

}

}catch{}

return null;

}

/* SHORT */

function isShort(url){

return url.includes("/shorts/");

}

/* FETCH */

async function fetchVideo(url){

const id = getVideoId(url);

if(!id) return null;

const type =
isShort(url)
? "short"
: "video";

let title = "Video";
let channel = "Canal";

try{

const res = await fetch(
`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`
);

const data = await res.json();

title = data.title || title;
channel = data.author_name || channel;

}catch{}

return{

id,
title,
channel,
type,
thumb:
`https://img.youtube.com/vi/${id}/hqdefault.jpg`

};

}

/* LOAD */

async function load(){

library = [];

for(const item of rawItems){

const data = await fetchVideo(item);

if(data){

library.push(data);

}

}

render();

}

/* RENDER */

function render(){

const videosGrid =
document.getElementById("videosGrid");

const shortsGrid =
document.getElementById("shortsGrid");

videosGrid.innerHTML = "";
shortsGrid.innerHTML = "";

const videos =
library.filter(v=>v.type==="video");

const shorts =
library.filter(v=>v.type==="short");

/* VIDEOS */

videos.forEach(v=>{

videosGrid.innerHTML += `
<div class="card"
onclick="playVideo('${v.id}')">

<div class="thumb-wrap">

<div class="thumb"
style="background-image:url('${v.thumb}')">
</div>

</div>

<h3>${v.title}</h3>

<p>${v.channel}</p>

</div>
`;

});

/* SHORTS */

shorts.forEach(v=>{

shortsGrid.innerHTML += `
<div class="card"
onclick="playVideo('${v.id}')">

<div class="thumb-wrap">

<div class="thumb"
style="background-image:url('${v.thumb}')">
</div>

<div class="short-badge">
SHORTS
</div>

</div>

<h3>${v.title}</h3>

<p>${v.channel}</p>

</div>
`;

});

}

/* PLAY */

function playVideo(id){

const item =
library.find(v=>v.id===id);

if(!item) return;

document.getElementById("playerScreen")
.style.display = "block";

const box =
document.getElementById("playerBox");

if(item.type==="short"){

box.classList.add("short");

document.getElementById("player").src =
`https://www.youtube.com/embed/${item.id}?autoplay=1&loop=1`;

}else{

box.classList.remove("short");

document.getElementById("player").src =
`https://www.youtube.com/embed/${item.id}?autoplay=1`;

}

document.getElementById("videoTitle")
.innerText = item.title;

document.getElementById("videoChannel")
.innerText = item.channel;

loadRecommended(id);

}

/* CLOSE */

function closePlayer(){

document.getElementById("playerScreen")
.style.display = "none";

document.getElementById("player").src = "";

}

/* RECOMMENDED */

function loadRecommended(current){

const rec =
document.getElementById("recommended");

rec.innerHTML = "";

library
.filter(v=>v.id!==current)
.forEach(v=>{

rec.innerHTML += `
<div class="rec-card"
onclick="playVideo('${v.id}')">

<div class="rec-thumb"
style="background-image:url('${v.thumb}')">
</div>

<div class="rec-info">

<h4>${v.title}</h4>

<p>${v.channel}</p>

</div>

</div>
`;

});

}

/* SETTINGS */

function toggleSettings(){

const s =
document.getElementById("settings");

s.style.display =
s.style.display==="block"
? "none"
: "block";

}

/* THEME */

function toggleTheme(){

document.body.classList.toggle("light");

}

/* RANDOM SHORT */

function randomShort(){

const shorts =
library.filter(v=>v.type==="short");

if(shorts.length===0){

alert("No hay shorts");

return;

}

const random =
shorts[Math.floor(Math.random()*shorts.length)];

playVideo(random.id);

}

/* HOME */

function showHome(){

document.getElementById("videosSection")
.style.display = "block";

document.getElementById("shortsSection")
.style.display = "block";

}

/* SHORTS */

function showShorts(){

document.getElementById("videosSection")
.style.display = "none";

document.getElementById("shortsSection")
.style.display = "block";

}

/* SEARCH */

document.getElementById("searchInput")
.addEventListener("input", function(){

const value =
this.value.toLowerCase();

const cards =
document.querySelectorAll(".card");

cards.forEach(card=>{

const text =
card.innerText.toLowerCase();

card.style.display =
text.includes(value)
? "block"
: "none";

});

});

/* START */

window.addEventListener("load", load);

</script>

</body>
</html>
