<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CGTube</title>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* HEADER */
    .header {
      padding: 15px 20px;
      background: #121212;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
    }

    .logo img {
      height: 35px;
    }

    /* GRID VIDEOS */
    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      cursor: pointer;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .title {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="images/chickentube_logo.png">
  </div>
</div>

<!-- CONTENEDOR DE VIDEOS -->
<div class="videos" id="videoContainer"></div>

<script>
  // 🔹 PEDIR VIDEOS A LinkVideo.html
  fetch("LinkVideo.html")
    .then(res => res.text())
    .then(text => {
      // Extraer el array de links del script
      const arrayMatch = text.match(/const videos = \[(.*?)\]/s);
      let videos = [];
      if (arrayMatch) {
        videos = arrayMatch[1]
          .split(",")
          .map(v => v.trim().replace(/['"]/g, "")) // quitar comillas
          .filter(v => v.length > 0);
      }

      const container = document.getElementById("videoContainer");

      // Generar tarjetas
      videos.forEach((v, i) => {
        const id = v.includes("watch?v=") ? v.split("watch?v=")[1].split("&")[0] : v.split("youtu.be/")[1];

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <img src="https://img.youtube.com/vi/${id}/0.jpg">
          <div class="title">Video ${i+1}</div>
        `;

        div.onclick = () => {
          window.location.href = "LinkVideo.html?link=" + encodeURIComponent(v);
        };

        container.appendChild(div);
      });
    });
</script>

</body>
</html>
