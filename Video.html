<!DOCTYPE html>
<html lang="es">
<head>
<link rel="icon" type="image/png" href="images/chickenguntube_weblogo.png">
<meta charset="UTF-8">
<title>CGTube</title>
<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  padding: 20px;
  flex-direction: column;
  align-items: center;
}

/* HEADER */
.header {
  width: 100%;
  max-width: 960px;
  display: flex;
  align-items: center;
  padding: 10px 0;
  margin-bottom: 20px;
}
.header img.logo {
  height: 60px;
  cursor: pointer;
}
.header .back-btn {
  font-size: 30px;
  margin-right: 15px;
  cursor: pointer;
  color: white;
  user-select: none;
}

/* CONTENEDOR VIDEO */
.container {
  width: 100%;
  max-width: 960px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
iframe {
  width: 100%;
  aspect-ratio: 16/9;
  border: none;
  border-radius: 12px;
}
.title {
  margin-top: 12px;
  font-weight: bold;
  font-size: 20px;
  text-align: center;
}
.channel {
  margin-top: 5px;
  color: #aaa;
  text-align: center;
  font-size: 16px;
}
</style>
</head>
<body>

<div class="header">
  <div class="back-btn" onclick="window.location.href='index.html'">&lt;</div>
  <img src="images/chickentube_logo.png" class="logo" onclick="window.location.href='index.html'">
</div>

<div class="container">
  <iframe id="player" allowfullscreen></iframe>
  <div id="title" class="title"></div>
  <div id="channel" class="channel"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const url = params.get("url");

// ❌ Si no hay URL → 404
if (!url) {
  window.location.href = "404.html";
}

// 🔹 Validar y obtener ID
let id = "";

if (url.includes("watch?v=")) {
  id = url.split("watch?v=")[1].split("&")[0];
} else if (url.includes("youtu.be/")) {
  id = url.split("youtu.be/")[1];
} else {
  // ❌ Link inválido → 404
  window.location.href = "404.html";
}

// 🎬 Cargar video
document.getElementById("player").src = "https://www.youtube.com/embed/" + id;

// 🔥 Obtener título + canal
fetch(`https://www.youtube.com/oembed?url=${url}&format=json`)
  .then(res => {
    if (!res.ok) throw new Error();
    return res.json();
  })
  .then(data => {
    document.getElementById("title").textContent = data.title;
    document.getElementById("channel").textContent = data.author_name;
  })
  .catch(() => {
    // Video eliminado / error
    window.location.href = "404.html";
  });

</script>

</body>
</html>
