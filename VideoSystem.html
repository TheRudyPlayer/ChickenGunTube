<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CGTube Video</title>
<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 960px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
iframe {
  width: 100%;
  aspect-ratio: 16/9;
  border: none;
  border-radius: 12px;
}
.title {
  margin-top: 12px;
  font-weight: bold;
  font-size: 20px;
  text-align: center;
}
.channel {
  margin-top: 5px;
  color: #aaa;
  text-align: center;
  font-size: 16px;
}
</style>
</head>
<body>

<div class="container">
  <iframe id="player" allowfullscreen></iframe>
  <div id="title" class="title"></div>
  <div id="channel" class="channel"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const url = params.get("url");

if (!url) {
  document.body.innerHTML = "Error al cargar el video";
} else {
  let id = url.includes("watch?v=") ? url.split("watch?v=")[1].split("&")[0] : url.split("youtu.be/")[1];

  const iframe = document.getElementById("player");
  iframe.src = "https://www.youtube.com/embed/" + id;

  fetch(`https://www.youtube.com/oembed?url=${url}&format=json`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("title").textContent = data.title;
      document.getElementById("channel").textContent = data.author_name;

      // 🔹 Pasar datos a index (opcional)
      window.opener?.postMessage({
        type: "videoData",
        videos: [{
          title: data.title,
          channel: data.author_name,
          thumbnail: `https://img.youtube.com/vi/${id}/0.jpg`
        }]
      }, "*");
    })
    .catch(() => {
      document.getElementById("title").textContent = "Video";
      document.getElementById("channel").textContent = "";
    });
}
</script>

</body>
</html>
