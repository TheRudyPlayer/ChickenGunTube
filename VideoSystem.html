<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CGTube</title>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 50px;
    }

    .container {
      text-align: center;
      max-width: 500px;
    }

    .thumb {
      width: 100%;
      border-radius: 12px;
    }

    .title {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold; /* ✅ bold */
    }

    .channel {
      margin-top: 5px;
      font-size: 14px;
      color: #aaa;
    }

    iframe {
      width: 100%;
      height: 280px;
      border: none;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Miniatura -->
  <img id="thumb" class="thumb">

  <!-- Título (bold) -->
  <div id="title" class="title"></div>

  <!-- Creador / Canal -->
  <div id="channel" class="channel"></div>

  <!-- Player -->
  <iframe id="player"></iframe>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const url = params.get("url");

  if (!url) {
    document.body.innerHTML = "Error al cargar el video";
  } else {
    // 🔹 Sacar ID del video
    let id = "";
    if (url.includes("watch?v=")) {
      id = url.split("watch?v=")[1].split("&")[0];
    } else if (url.includes("youtu.be/")) {
      id = url.split("youtu.be/")[1];
    }

    // 🔹 Embed
    const embed = "https://www.youtube.com/embed/" + id;
    document.getElementById("player").src = embed;

    // 🔹 Usar oEmbed para datos reales
    fetch(`https://www.youtube.com/oembed?url=${url}&format=json`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("title").textContent = data.title; // ✅ bold
        document.getElementById("channel").textContent = data.author_name;
        document.getElementById("thumb").src = data.thumbnail_url;
      })
      .catch(() => {
        document.getElementById("title").textContent = "No se pudo cargar";
      });
  }
</script>

</body>
</html>
