<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Error 404</title>
  <style>
    body {
      margin: 0;
      background-color: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden; /* Quita scroll */
    }

    .error-code {
      font-size: 90px;
      color: #ff3d3d;
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 30px;
      max-width: 700px;
      padding: 20px;
    }

    .logo img {
      width: 130px;
      height: auto;
    }

    .text {
      text-align: left;
    }

    .text h2 {
      margin: 0 0 10px 0;
    }

    .text p {
      color: #ccc;
      margin: 6px 0;
      line-height: 1.5;
    }

    .buttons {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      background-color: #ff3d3d;
      border: none;
      color: white;
      font-size: 15px;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background-color: #e62e2e;
    }

    @media (max-width: 600px) {
      .container {
        flex-direction: column;
        text-align: center;
      }

      .text {
        text-align: center;
      }

      .buttons {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- Número de error -->
  <div class="error-code">404</div>

  <div class="container">
    
    <!-- Logo -->
    <div class="logo">
      <img src="assets/chickentube_logo.png" alt="Logo CGTube">
    </div>

    <!-- Texto -->
    <div class="text">
      <h2>CGTube no está disponible</h2>
      <p>
        El servicio no se encuentra disponible en este momento o ha sido interrumpido inesperadamente.
      </p>
      <p>
        Por favor, espere mientras el equipo de desarrollo implementa una nueva versión
        para restablecer el funcionamiento del sistema.
      </p>

      <!-- BOTONES -->
      <div class="buttons">
        <button onclick="window.location.href='index.html'">
          Página Principal
        </button>

        <button onclick="location.reload()">
          Reintentar
        </button>
      </div>

    </div>

  </div>

</body>
</html>
